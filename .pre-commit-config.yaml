fail_fast: true
default_install_hook_types:
  - pre-commit
  - post-checkout
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: debug-statements
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]
        stages: [pre-commit]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.3
    hooks:
      - id: commitizen
      - id: commitizen-branch
        stages: [pre-push]
  - repo: local
    hooks:
      - id: uv-lock
        name: uv-lock
        description: "Automatically run 'uv lock' on your project dependencies"
        entry: uv lock
        language: python
        files: ^(uv\.lock|pyproject\.toml|uv\.toml)$
        args: []
        pass_filenames: false
        additional_dependencies: []
      - id: uv-export
        name: uv-export
        description: "Automatically run 'uv export' on your project dependencies"
        entry: uv export
        language: python
        files: ^uv\.lock$
        args: ["--frozen", "--output-file=requirements.txt", "--quiet"]
        pass_filenames: false
        additional_dependencies: []
      - id: uv-sync
        name: uv-sync
        description: "Automatically run 'uv sync' on your repository after a checkout, pull or rebase"
        entry: uv sync --no-active
        args: ["--locked"]
        language: python
        always_run: true
        pass_filenames: false
        stages: [post-checkout, post-merge, post-rewrite]
      - id: uv-audit
        name: uv-audit
        description: "Automatically run 'uv audit' on your project dependencies"
        entry: uv audit
        language: python
        files: ^(uv\.lock|pyproject\.toml|uv\.toml)$
        args: []
        pass_filenames: false
        additional_dependencies: []
